  #ui-panel {

    padding: 20px;
    overflow-y: auto;

  .legend-section { background: #16213e; padding: 12px; border-radius: 8px; }

  .legend-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 13px; }
  .color-box { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #fff; }
  .marker-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  #info-box {
    background: #16213e;
    padding: 15px;
    border-radius: 8px;
    min-height: 200px;
    border: 1px solid #e94560;
  }

  #info-box p { font-size: 13px; line-height: 1.6; color: #ccc; margin: 4px 0; }
  #info-box .stat { color: #e94560; font-weight: bold; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  button {
    flex: 1;
    padding: 8px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.2s;
  }

  button.active { background: #ffd700; color: #1a1a2e; }
  .layer-toggle { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

    background: #1a1a2e;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;

  #tooltip {

    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    pointer-events: none;
    display: none;
    z-index: 1000;
    border: 1px solid #e94560;
    max-width: 250px;
  }

  #tooltip .tt-type { color: #aaa; font-size: 11px; }

// ===================== Canvas 引擎 =====================
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('map-container');
const tooltip = document.getElementById('tooltip');
const infoBox = document.getElementById('info-box');

let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let dragStartX, dragStartY;
let selectedEntity = null;

// 底图图片（使用用户上传的地图）
const bgImage = new Image();
bgImage.src = 'map.png'; // CLI 需确保地图文件与此 HTML 同目录
// 如果无本地图片，使用占位背景色
bgImage.onload = () => {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  render();
};
bgImage.onerror = () => {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  render();
};

function worldToScreen(x, y) {
  return { x: x * scale + offsetX, y: y * scale + offsetY };
}

function screenToWorld(sx, sy) {
  return { x: (sx - offsetX) / scale, y: (sy - offsetY) / scale };
}

function render() {
  const w = canvas.width = container.clientWidth;
  const h = canvas.height = container.clientHeight;
  ctx.clearRect(0, 0, w, h);

  // 绘制底图
  if (bgImage.complete && bgImage.naturalWidth > 0) {
    const imgAspect = bgImage.naturalWidth / bgImage.naturalHeight;
    const canvasAspect = w / h;
    let drawW, drawH, drawX, drawY;
    if (imgAspect > canvasAspect) {
      drawH = h; drawW = h * imgAspect;
      drawX = (w - drawW) / 2; drawY = 0;
    } else {
      drawW = w; drawH = w / imgAspect;
      drawX = 0; drawY = (h - drawH) / 2;
    }
    ctx.drawImage(bgImage, drawX, drawY, drawW, drawH);
  } else {
    // 无图时的海洋背景
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(0, 0, w, h);
  }

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // 绘制势力范围
  if (document.getElementById('show-territory').checked) {
    MAP_DATA.territories.forEach(t => {
      ctx.beginPath();
      ctx.moveTo(t.path[0][0], t.path[0][1]);
      for (let i = 1; i < t.path.length; i++) ctx.lineTo(t.path[i][0], t.path[i][1]);
      ctx.closePath();
      ctx.fillStyle = t.color;
      ctx.fill();
      ctx.strokeStyle = t.border;
      ctx.lineWidth = 2;
      ctx.stroke();

      // 势力名称标签（中心点）
      if (document.getElementById('show-labels').checked) {
        let cx = 0, cy = 0;
        t.path.forEach(p => { cx += p[0]; cy += p[1]; });
        cx /= t.path.length; cy /= t.path.length;
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.font = "bold 14px sans-serif";
        const tw = ctx.measureText(t.name).width;
        ctx.fillRect(cx - tw/2 - 4, cy - 10, tw + 8, 20);
        ctx.fillStyle = "#ffd700";
        ctx.textAlign = "center";
        ctx.fillText(t.name, cx, cy + 4);
      }
    });
  }

  // 绘制恩怨线
  if (document.getElementById('show-grudges').checked) {
    MAP_DATA.grudges.forEach(g => {
      const fromCity = MAP_DATA.cities.find(c => c.name === g.from);
      const toCity = MAP_DATA.cities.find(c => c.name === g.to);
      if (fromCity && toCity) {
        ctx.beginPath();
        ctx.moveTo(fromCity.x, fromCity.y);
        ctx.lineTo(toCity.x, toCity.y);
        ctx.strokeStyle = g.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 6]);
        ctx.stroke();
        ctx.setLineDash([]);
        // 中点标签
        const mx = (fromCity.x + toCity.x) / 2;
        const my = (fromCity.y + toCity.y) / 2;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.font = "11px sans-serif";
        const tw = ctx.measureText(g.label).width;
        ctx.fillRect(mx - tw/2 - 3, my - 8, tw + 6, 16);
        ctx.fillStyle = g.color;
        ctx.textAlign = "center";
        ctx.fillText(g.label, mx, my + 3);
      }
    });
  }

  // 绘制城市
  if (document.getElementById('show-cities').checked) {
    MAP_DATA.cities.forEach(c => {
      const isSelected = selectedEntity && selectedEntity.name === c.name;
      const size = c.type === 'capital' ? 10 : (c.type === 'major' ? 7 : 4);

      // 外发光
      if (isSelected) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, size + 8, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(233,69,96,0.3)";
        ctx.fill();
      }

      ctx.beginPath();
      if (c.type === 'capital') {
        // 五角星
        for (let i = 0; i < 5; i++) {
          const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
          const r = i % 2 === 0 ? size : size / 2;
          const px = c.x + Math.cos(angle) * r;
          const py = c.y + Math.sin(angle) * r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
      } else if (c.type === 'major') {
        ctx.moveTo(c.x, c.y - size);
        ctx.lineTo(c.x + size, c.y);
        ctx.lineTo(c.x, c.y + size);
        ctx.lineTo(c.x - size, c.y);
        ctx.closePath();
      } else if (c.type === 'church') {
        ctx.moveTo(c.x, c.y - size);
        ctx.lineTo(c.x + size * 0.7, c.y + size);
        ctx.lineTo(c.x - size * 0.7, c.y + size);
        ctx.closePath();
      } else {
        ctx.arc(c.x, c.y, size, 0, Math.PI * 2);
      }

      // 颜色按种族
      const raceColors = { human: '#ff6b6b', dwarf: '#cd853f', elf: '#51cf66', orc: '#ff922b', church: '#ffd43b', frontier: '#868e96' };
      ctx.fillStyle = raceColors[c.race] || '#fff';
      ctx.fill();
      ctx.strokeStyle = isSelected ? '#e94560' : '#fff';
      ctx.lineWidth = isSelected ? 3 : 1.5;
      ctx.stroke();

      // 地名标签
      if (document.getElementById('show-labels').checked) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.font = "12px sans-serif";
        const label = c.name;
        const tw = ctx.measureText(label).width;
        ctx.fillRect(c.x - tw/2 - 2, c.y + size + 2, tw + 4, 16);
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.fillText(label, c.x, c.y + size + 14);
      }
    });
  }

  // 绘制四天王要塞
  if (document.getElementById('show-forts').checked) {
    MAP_DATA.forts.forEach(f => {
      const isSelected = selectedEntity && selectedEntity.name === f.name;
      const size = 12;

      // 三角形要塞标记
      ctx.beginPath();
      ctx.moveTo(f.x, f.y - size);
      ctx.lineTo(f.x + size * 0.9, f.y + size * 0.7);
      ctx.lineTo(f.x - size * 0.9, f.y + size * 0.7);
      ctx.closePath();

      ctx.fillStyle = isSelected ? '#e94560' : '#a29bfe';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 连线到目标城市
      const target = MAP_DATA.cities.find(c => c.name === f.target);
      if (target) {
        ctx.beginPath();
        ctx.moveTo(f.x, f.y);
        ctx.lineTo(target.x, target.y);
        ctx.strokeStyle = 'rgba(162,155,254,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (document.getElementById('show-labels').checked) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.font = "11px sans-serif";
        const tw = ctx.measureText(f.name).width;
        ctx.fillRect(f.x - tw/2 - 2, f.y - size - 18, tw + 4, 16);
        ctx.fillStyle = "#a29bfe";
        ctx.textAlign = "center";
        ctx.fillText(f.name, f.x, f.y - size - 6);
      }
    });
  }

  ctx.restore();
}

// ===================== 交互逻辑 =====================
function getHoveredEntity(mx, my) {
  const w = screenToWorld(mx, my);
  // 检查城市
  for (let c of MAP_DATA.cities) {
    const size = c.type === 'capital' ? 14 : (c.type === 'major' ? 10 : 7);
    const dx = w.x - c.x, dy = w.y - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < size) return { type: 'city', data: c };
  }
  // 检查要塞
  for (let f of MAP_DATA.forts) {
    const dx = w.x - f.x, dy = w.y - f.y;
    if (Math.sqrt(dx*dx + dy*dy) < 14) return { type: 'fort', data: f };
  }
  // 检查势力区域
  for (let t of MAP_DATA.territories) {
    if (pointInPolygon(w.x, w.y, t.path)) return { type: 'territory', data: t };
  }
  return null;
}

function pointInPolygon(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i][0], yi = poly[i][1];
    const xj = poly[j][0], yj = poly[j][1];
    const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function showTooltip(e, entity) {
  if (!entity) { tooltip.style.display = 'none'; return; }
  const d = entity.data;
  let html = '';
  if (entity.type === 'city') {
    const typeNames = { capital: '主城', major: '副城', town: '城镇', church: '教廷圣地' };
    const raceNames = { human: '人类', dwarf: '矮人', elf: '精灵', orc: '兽人', church: '教廷', frontier: '边缘' };
    html = `<div class="tt-title">${d.name}</div><div class="tt-type">${typeNames[d.type] || d.type} · ${raceNames[d.race] || d.race}</div><div style="margin-top:4px">人口: ${d.pop}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${d.feature}</div>`;
  } else if (entity.type === 'fort') {
    html = `<div class="tt-title">${d.name}</div><div class="tt-type">四天王要塞 · ${d.king}</div><div style="margin-top:4px">驻军: ${d.garrison}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${d.desc}</div>`;
  } else if (entity.type === 'territory') {
    html = `<div class="tt-title">${d.name}</div><div class="tt-type">${d.race} · ${d.ratio}</div><div style="margin-top:4px">人口: ${d.pop}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${d.desc}</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 15) + 'px';
  tooltip.style.top = (e.clientY + 15) + 'px';
}

function updateInfoBox(entity) {
  if (!entity) return;
  const d = entity.data;
  let html = '';
  if (entity.type === 'city') {
    const typeNames = { capital: '主城', major: '副城', town: '城镇', church: '教廷圣地' };
    const raceNames = { human: '人类', dwarf: '矮人', elf: '精灵', orc: '兽人', church: '教廷', frontier: '边缘地带' };
    html = `<h2>${d.name}</h2>
      <p><span class="stat">类型:</span> ${typeNames[d.type] || d.type}</p>
      <p><span class="stat">种族:</span> ${raceNames[d.race] || d.race}</p>
      <p><span class="stat">人口:</span> ${d.pop}</p>
      <p><span class="stat">坐标:</span> (${d.x}, ${d.y})</p>
      <p style="margin-top:8px"><span class="stat">特色:</span> ${d.feature}</p>`;
    if (d.type === 'capital') {
      const fort = MAP_DATA.forts.find(f => f.target === d.name);
      if (fort) html += `<p style="margin-top:8px;color:#a29bfe"><span class="stat">监视要塞:</span> ${fort.name}（${fort.direction}）</p>`;
    }
  } else if (entity.type === 'fort') {
    html = `<h2>${d.name}</h2>
      <p><span class="stat">镇守:</span> ${d.king}</p>
      <p><span class="stat">驻军:</span> ${d.garrison}</p>
      <p><span class="stat">监视目标:</span> ${d.target}（${d.direction}）</p>
      <p style="margin-top:8px"><span class="stat">职能:</span> ${d.desc}</p>`;
  } else if (entity.type === 'territory') {
    html = `<h2>${d.name}</h2>
      <p><span class="stat">主导种族:</span> ${d.race}</p>
      <p><span class="stat">人口:</span> ${d.pop}（${d.ratio}）</p>
      <p style="margin-top:8px"><span class="stat">概况:</span> ${d.desc}</p>`;
  }
  infoBox.innerHTML = html;
}

// 鼠标事件
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (isDragging) {
    offsetX += mx - dragStartX;
    offsetY += my - dragStartY;
    dragStartX = mx; dragStartY = my;
    render();
    return;
  }
  const entity = getHoveredEntity(mx, my);
  showTooltip(e, entity);
  canvas.style.cursor = entity ? 'pointer' : (isDragging ? 'grabbing' : 'crosshair');
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  dragStartX = e.clientX - rect.left;
  dragStartY = e.clientY - rect.top;
  isDragging = true;
});

canvas.addEventListener('mouseup', e => {
  if (isDragging) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const dx = mx - dragStartX, dy = my - dragStartY;
    if (Math.sqrt(dx*dx + dy*dy) < 5) {
      // 点击而非拖拽
      const entity = getHoveredEntity(mx, my);
      selectedEntity = entity ? entity.data : null;
      updateInfoBox(entity);
      render();
    }
  }
  isDragging = false;
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  isDragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.max(0.3, Math.min(5, scale * zoomFactor));
  offsetX = mx - (mx - offsetX) * (newScale / scale);
  offsetY = my - (my - offsetY) * (newScale / scale);
  scale = newScale;
  render();
});

// 控制按钮
function zoomIn() { scale = Math.min(5, scale * 1.3); render(); }
function zoomOut() { scale = Math.max(0.3, scale / 1.3); render(); }
function resetView() { scale = 1; offsetX = 0; offsetY = 0; selectedEntity = null; render(); }

// 窗口调整
window.addEventListener('resize', render);

// 初始渲染（等待图片或立即）
setTimeout(render, 100);
</script>
</body>
</html>
